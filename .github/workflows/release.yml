name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Composer deps (no dev)
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node deps & build
        run: npm ci && npm run build

      - name: Update version in plugin file
        run: |
          sed -i "s/Version:.*$/Version:           ${{ steps.version.outputs.VERSION }}/" boostcart.php
          sed -i "s/define( 'CM_VERSION', '.*' );/define( 'CM_VERSION', '${{ steps.version.outputs.VERSION }}' );/" boostcart.php

      - name: Generate changelog from git log
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            git log --pretty=format:"- %s" > CHANGELOG_RELEASE.md
          else
            git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" > CHANGELOG_RELEASE.md
          fi
          echo "Generated changelog:"
          cat CHANGELOG_RELEASE.md

      - name: Build distribution directory
        run: |
          DIST_DIR="boostcart"
          mkdir -p dist/$DIST_DIR
          rsync -a \
            --exclude-from='.distignore' \
            --exclude='dist' \
            . dist/$DIST_DIR/

      - name: Create plugin ZIP
        run: |
          cd dist
          zip -r "../boostcart-v${{ steps.version.outputs.VERSION }}.zip" boostcart/
          cd ..
          echo "ZIP created: boostcart-v${{ steps.version.outputs.VERSION }}.zip"
          ls -lh "boostcart-v${{ steps.version.outputs.VERSION }}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Boostcart for WooCommerce v${{ steps.version.outputs.VERSION }}
          body_path: CHANGELOG_RELEASE.md
          files: boostcart-v${{ steps.version.outputs.VERSION }}.zip
          draft: false
          prerelease: false
